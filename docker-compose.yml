services:
  deko:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - deko_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  deko_data:
