name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked 2>/dev/null || true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test --verbose
        env:
          DEKO_DATABASE_URL: sqlite::memory:
          DEKO_ADMIN_PASSWORD: test
          DEKO_API_KEY_SECRET: test-secret-key-12345678

      - name: Run cargo-audit
        run: cargo audit 2>/dev/null || echo "cargo-audit not available or found issues"

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          DEKO_PORT: "8000"
          DEKO_ENV: dev
          DEKO_ADMIN_PASSWORD: testpassword
          DEKO_DATABASE_URL: "sqlite::memory:"
          DEKO_API_KEY_SECRET: "test-secret-key-12345678"
          GEMINI_API_KEY: "test-key"
          DEKO_WEBHOOK_URL: ""

      - name: Build
        run: cargo build --release

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t deko:latest .

      - name: Smoke test
        run: |
          docker run -d --name deko-test \
            -e DEKO_PORT=8000 \
            -e DEKO_ENV=dev \
            -e DEKO_ADMIN_PASSWORD=testpassword \
            -e DEKO_DATABASE_URL="sqlite:///data/deko.db" \
            -e DEKO_API_KEY_SECRET="test-secret-key-12345678" \
            -e GEMINI_API_KEY=test-key \
            deko:latest
          sleep 5
          docker logs deko-test
          docker stop deko-test
          docker rm deko-test
